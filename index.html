<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Incrível</title>
    <style>
        /* Estilo do Site (CSS) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 800px;
            padding: 2rem;
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-top: -50px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bem-vindo ao Meu Site</h1>
        <p>Criado de forma rápida e elegante</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>Olá, Mundo!</h2>
            <p>Este é um exemplo de código pronto para você começar. Você pode editar os textos e as cores como quiser.</p>
            <button onclick="msg()">Clique Aqui</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 - Desenvolvido por Você</p>
    </footer>

    <script>
        // Função simples para interatividade
        function msg() {
            alert("O botão está funcionando! Agora é só personalizar.");
        }
    </script>

</body>
</html>
